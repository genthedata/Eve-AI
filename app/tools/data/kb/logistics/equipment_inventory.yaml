# ── Vehicle loading plans ─────────────────────────────────────────────────
vehicle_loading_plans:
  - plan_id: LOAD-BUFFET-SMALL
    for: "Buffet events 50–100 pax"
    vehicles_required:
      - vehicle_id: VH-001
        role: cold_chain
        load: [chilled_proteins, dairy, cold_desserts]
      - vehicle_id: VH-002
        role: equipment_and_dry_goods
        load: [chafing_dishes_20, rice_cookers_4, hot_boxes_4, dry_ingredients]
    notes: "Lorry not required for small events. 2 vehicles sufficient."

  - plan_id: LOAD-BUFFET-MEDIUM
    for: "Buffet events 101–300 pax"
    vehicles_required:
      - vehicle_id: VH-001
        role: cold_chain
        load: [chilled_proteins, dairy, cold_desserts, ice_boxes]
      - vehicle_id: VH-002_unit1
        role: large_equipment
        load: [round_tables_10, chairs_100, buffet_tables_6, bar_counter]
      - vehicle_id: VH-002_unit2
        role: cooking_and_serviceware
        load: [chafing_dishes_30, rice_cookers_6, hot_boxes_8, induction_tops_4, dry_goods]
    lorry_required: false
    notes: "2 cargo vans + refrigerated van. Confirm all items fit before event day."

  - plan_id: LOAD-BUFFET-LARGE
    for: "Buffet events 301–600 pax"
    vehicles_required:
      - vehicle_id: VH-001
        role: cold_chain
        load: [chilled_proteins, dairy, cold_desserts, ice_boxes_6]
      - vehicle_id: VH-003
        role: furniture_and_large_equipment
        load: [round_tables_20, chairs_200, buffet_tables_12, gas_burners, generator_if_needed]
      - vehicle_id: VH-002_unit1
        role: cooking_equipment
        load: [chafing_dishes_40, rice_cookers_8, hot_boxes_10, induction_tops_8]
      - vehicle_id: VH-002_unit2
        role: dry_goods_and_supplies
        load: [dry_ingredients, sterno_fuel, ice, packaging, service_supplies]
    lorry_required: true

# ── Double-booking detection rules ────────────────────────────────────────
double_booking_rules:
  - rule: "Before confirming any event, check `current_commitments` on all required equipment."
  - rule: "Same-day events sharing owned equipment: only allowed if total quantity needed <= quantity owned."
  - rule: "Rental equipment: check lead_time_days — rental must be confirmed before lead time."
  - rule: "Refrigerated van: only 1 exists. Two same-day events requiring cold chain = scheduling conflict."
  - rule: "Driver assignment: each driver can only operate 1 event per day. Cross-check before assigning."
  - rule: "Flag equipment conflict at quote stage, not on event day."

maintenance_schedules:
  - equipment: all_cooking_equipment
    frequency: after_each_event
    task: "Clean thoroughly. Inspect for damage. Report defects immediately."
  - equipment: rice_cookers
    frequency: quarterly
    task: "Descale. Replace gaskets if worn."
  - equipment: gas_burners
    frequency: monthly
    task: "Inspect LPG connections, valves, hose integrity. Replace hose if >12 months old."
  - equipment: chafing_dishes
    frequency: annually
    task: "Replace water pans if rusted. Inspect frames and handles."
  - equipment: hot_boxes
    frequency: biannually
    task: "Inspect insulation. Clean interior. Replace door seals if leaking heat."
  - equipment: refrigerated_van
    frequency: monthly
    task: "Check refrigeration unit. Test temperature calibration. Inspect door seals."
