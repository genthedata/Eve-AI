general_venue_checklist:
  pre_event_site_visit_required_if: [first_time_at_venue, venue_reported_changes, outdoor_event]
  site_visit_checklist:
    - Confirm loading dock dimensions and vehicle height restriction
    - Walk service corridor from loading point to buffet/service area — time the walk
    - Count steps/flights if no service lift
    - Locate all power outlets and confirm amperage
    - Test water pressure at kitchen/prep area
    - Locate venue manager on-site contact
    - Check ceiling height for any overhead equipment or live stations
    - Confirm setup access time (when can staff enter?)
    - Identify noise/curfew restrictions
    - Photograph any permanent fixtures that could interfere with setup
    - Ask about past catering events — what went wrong?

  day_of_setup:
    - Bring physical copy of event letter and venue booking confirmation
    - Arrive at least 4h before service for venues with on-site kitchen
    - Arrive at least 5h before for venues without kitchen (prep tent setup needed)
    - Label ALL equipment with company name for post-event recovery
    - Assign 1 staff member as "venue liaison" — knows all venue constraints
    - Station staff at each buffet position 30min before first guest arrives
