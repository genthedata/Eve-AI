overtime_rules:
  - region: Philippines
    standard_hours: 8
    overtime_rate_multiplier: 1.25
    night_differential_pct: 10
    night_differential_start: "22:00"
    rest_day_rate_multiplier: 1.30
    applicable_law: "Philippine Labor Code"

  - region: Malaysia
    standard_hours: 8
    overtime_rate_multiplier: 1.50
    rest_day_rate_multiplier: 2.00
    applicable_law: "Employment Act 1955"

  - region: Singapore
    standard_hours: 8
    overtime_rate_multiplier: 1.50
    applicable_law: "Employment Act (Singapore)"

availability_rules:
  - rule: "Head Chef and Sous Chef: minimum 14 days booking lead time."
  - rule: "Banquet waiters and station staff: 7 days minimum lead time."
  - rule: "Peak seasons (Dec, Chinese New Year, Eid, Deepavali): book 30+ days ahead."
  - rule: "Cancellation within 48h of event: 50% of staffing cost is charged."
  - rule: "No staff with expired certifications may handle food. Check before confirming assignment."

certification_tracker:
  # Flags staff whose certifications expire within 60 days — must be renewed before event booking
  expiry_warning_threshold_days: 60
  critical_certs:
    - food_safety_level_1
    - food_safety_level_2
    - food_safety_level_3
    - food_handling_cert
    - driving_licence_class_B
    - driving_licence_class_D
