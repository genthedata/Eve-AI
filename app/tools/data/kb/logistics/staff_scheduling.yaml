---
# Staff Roles & Scheduling Knowledge Base
# Structured roles, certification requirements, staff-to-guest ratios,
# named staff roster with availability, and event-level staffing models.

# ── Role Definitions ──────────────────────────────────────────────────────

roles:
  - role_id: ROLE-001
    title: Head Chef
    category: kitchen
    responsibilities:
      - Final menu approval and kitchen supervision
      - Quality control throughout entire service period
      - Manages and directs all kitchen staff
      - Liaises with client on day-of special requests
      - Signs off on food safety compliance at kitchen close
    required_certifications: [food_safety_level_3, halal_kitchen_cert_if_applicable]
    staff_to_guest_ratio: "1 per event (regardless of size)"
    min_hours_before_service: 4
    min_hours_after_service: 1
    typical_shift_hours: 10
    standby_required: false
    notes: >
      For large events (>400 pax), a second senior chef (Sous Chef) is mandatory.
      Head Chef must not leave venue during active service period.

  - role_id: ROLE-002
    title: Sous Chef
    category: kitchen
    responsibilities:
      - Assists Head Chef, supervises one or more stations
      - Runs a section independently (e.g., hot station, cold station)
      - Can act as Head Chef in emergencies
    required_certifications: [food_safety_level_2]
    staff_to_guest_ratio:
      buffet: "1 per 200 guests"
      plated: "1 per 100 guests"
    min_hours_before_service: 4
    min_hours_after_service: 0.5
    typical_shift_hours: 9
    notes: "Required for events >200 pax (buffet) or >100 pax (plated)."

  - role_id: ROLE-003
    title: Line Cook / Station Cook
    category: kitchen
    responsibilities:
      - Operates a single buffet or live cooking station
      - Prepares, cooks, and replenishes dishes throughout service
      - Follows mise en place assigned by Head Chef
    required_certifications: [food_safety_level_1]
    staff_to_guest_ratio:
      buffet: "1 per 60 guests"
      plated: "1 per 30 guests"
      live_station: "1 dedicated cook per live station"
    min_hours_before_service: 3.5
    min_hours_after_service: 0.5
    typical_shift_hours: 8
    notes: >
      Live cooking station cooks (satay, carving, wok) require performance capability.
      Standard line cooks should NOT be assigned to live stations without experience check.

  - role_id: ROLE-004
    title: Commis Chef / Kitchen Assistant
    category: kitchen
    responsibilities:
      - Prep work under line cook supervision
      - Vegetable cuts, washing, portioning
      - Restocks kitchen during service
    required_certifications: [food_safety_level_1]
    staff_to_guest_ratio: "1 per 100 guests (buffet)"
    min_hours_before_service: 4
    typical_shift_hours: 8

  - role_id: ROLE-005
    title: Event Supervisor
    category: management
    responsibilities:
      - Manages front-of-house service team
      - Coordinates between kitchen and service floor
      - Handles client liaison during event
      - Manages timing of courses and service flow
    required_certifications: [food_handling_cert]
    staff_to_guest_ratio: "1 per event"
    min_hours_before_service: 3
    min_hours_after_service: 1
    typical_shift_hours: 10
    notes: "Required for all events >100 pax. For smaller events, Head Chef doubles as supervisor."

  - role_id: ROLE-006
    title: Food Server / Banquet Waiter
    category: service
    responsibilities:
      - Table service, food and beverage placement
      - Guest interaction and requests
      - Clears and resets tables
      - Replenishes beverages
    required_certifications: [food_handling_cert]
    staff_to_guest_ratio:
      buffet: "1 per 30 guests"
      plated: "1 per 10 guests"
      cocktail: "1 per 20 guests"
    min_hours_before_service: 2
    min_hours_after_service: 1
    typical_shift_hours: 7
    notes: "Plated service requires significantly more service staff. Never understaff plated events."

  - role_id: ROLE-007
    title: Buffet Station Attendant
    category: service
    responsibilities:
      - Monitors buffet food levels
      - Replenishes food from kitchen to buffet station
      - Maintains cleanliness and presentation of station
      - Removes empty trays and spent Sterno fuel
    required_certifications: [food_handling_cert]
    staff_to_guest_ratio: "1 per 2 buffet stations (min 2 per event)"
    min_hours_before_service: 2
    min_hours_after_service: 0.5
    typical_shift_hours: 7
    notes: "Critical during evening rush (first 45min of service). Never leave station unattended."

  - role_id: ROLE-008
    title: Beverage Server / Mocktail Attendant
    category: beverage
    responsibilities:
      - Prepares and serves beverages
      - Manages bar/mocktail inventory
      - Monitors guest beverage preferences
    required_certifications: [food_handling_cert]
    staff_to_guest_ratio:
      mocktail_station: "1 per 60 guests"
      full_bar_alcohol: "1 per 40 guests"
    min_hours_before_service: 2
    typical_shift_hours: 7
    notes: "Alcohol service requires applicable licence. Confirm licensing 30 days before event."

  - role_id: ROLE-009
    title: Setup & Teardown Crew
    category: logistics
    responsibilities:
      - Unloads vehicles and transports to venue floor
      - Assembles tables, chairs, chafing dish stands
      - Dismantles and loads all equipment after event close
    required_certifications: []
    staff_to_guest_ratio: "3 crew for <200 guests; 5 crew for >200 guests"
    min_hours_before_service: 5
    min_hours_after_teardown: 2
    typical_shift_hours: 10
    notes: "Setup crew may double as runner/porter during event service if not needed for setup."

  - role_id: ROLE-010
    title: Driver / Logistics Coordinator
    category: logistics
    responsibilities:
      - Drives delivery vehicles (refrigerated van, cargo van, lorry)
      - Coordinates food and equipment delivery schedule
      - Manages loading bay communication with venue
      - Returns all equipment after event
    required_certifications: [valid_driving_licence_class_B, food_handling_cert]
    required_licence_for_lorry: driving_licence_class_D
    staff_to_guest_ratio: "1 per delivery vehicle"
    min_hours_before_service: 5
    typical_shift_hours: 12
    notes: >
      Driver must have route-specific knowledge for major venues.
      Brief driver on venue access restrictions, loading dock hours, and vehicle height limits
      before each event.

  - role_id: ROLE-011
    title: Dishwasher / Kitchen Utility
    category: kitchen
    responsibilities:
      - Cleans and returns equipment throughout service
      - Maintains kitchen hygiene stations
      - Manages waste and recycling during event
    required_certifications: [food_handling_cert]
    staff_to_guest_ratio: "1 per 100 guests (buffet)"
    min_hours_before_service: 1
    typical_shift_hours: 8

