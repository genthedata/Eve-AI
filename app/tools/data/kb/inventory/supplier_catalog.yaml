procurement_rules:
  - rule: Lead time buffer
    description: Always add 1 business day to stated lead time for contingency.

  - rule: Minimum spend consolidation
    description: >
      For events with food cost under MYR 5,000 / PHP 50,000 / SGD 2,000,
      consolidate orders to a single primary supplier to meet MOQ thresholds.

  - rule: Substitution approval
    description: >
      Substitutions to proteins or allergen items require client sign-off
      at least 48h before event. Document in contract amendment.

  - rule: Cold chain
    description: >
      Chilled items must arrive at <=4C. Reject any delivery above 7C.
      Seafood must arrive max 2h before prep start. No overnight unrefrigerated storage.

  - rule: Credit limit
    description: >
      Do not raise a PO that would exceed the supplier's credit limit without
      Operations Manager pre-approval.

  - rule: Volatile price lock
    description: >
      For items flagged price_volatile: true, lock in supplier price at
      PO confirmation. Do not accept post-confirmation price revisions.
