---
# Ingredient-to-Recipe Mapping Knowledge Base
# Maps every menu dish to its raw ingredient quantities per single adult serving.
# Used by demand_planner.py to translate a menu plan + guest count into a
# precise raw procurement list before stock subtraction is applied.
#
# Canonical procurement_key values used here:
#   chicken_kg, beef_kg, pork_kg, seafood_fish_kg, seafood_prawn_kg,
#   tofu_kg, lentils_kg, rice_kg, rice_noodles_kg, pasta_kg,
#   vegetables_kg, aromatics_kg, coconut_milk_l, cooking_oil_l,
#   soy_sauce_l, fish_sauce_l, vinegar_l, fresh_herbs_kg,
#   dairy_cream_l, eggs_pcs, flour_kg, sugar_kg, fruit_kg,
#   spice_blend_pack, peanut_sauce_kg, tamarind_l, broth_l, miso_l
#
# All qty values are per ONE adult serving.
# unit: g (grams), ml (millilitres), pcs (pieces), pack (fractional)
#
# prep_waste_pct: additional % added for trimming / cooking loss
# cold_chain: ambient | chilled | frozen (required storage during delivery)

