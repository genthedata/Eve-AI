positioning_guide:
  - scenario: "Prospect is comparing to hotel in-house catering"
    strategy: >
      Emphasize flexibility, cultural authenticity, and off-site capability.
      Hotels win on bundling; we win on bespoke menus and personalisation.
      Price slightly below hotel (10–15%) and throw in 1 free live station.

  - scenario: "Prospect received cheaper quote from LoCostCater PH"
    strategy: >
      Do not match price. Highlight halal certification, quality ingredients,
      and post-mortem track record. Offer value-add (branded menu cards, extra
      service staff) rather than discount.

  - scenario: "Large corporate client with Preferred Vendor List (PVL)"
    strategy: >
      Submit for PVL qualification early. Emphasize certifications (halal, HACCP),
      insurance documentation, and financial stability. Corporate procurement
      cares about compliance and risk more than price.
