# ── Venue search rules for customer_agent ────────────────────────────────
venue_lookup_rules:
  - If client mentions a venue: look up venue_id; if not_compatible, flag immediately
  - If venue is compatible: pass kitchen_available, halal_only_venue, access_constraints to logistics_agent
  - If venue is unknown: flag to logistics_agent for site visit assessment
  - Always confirm outside_catering_allowed before quoting

outdoor_event_notes:
  outdoor_requirements:
    - Portable cooking equipment (gas or induction depending on event size)
    - Generator if no power access on-site
    - Canopy or shelter for food prep area
    - Additional staff for transport logistics
  weather_contingency:
    Malaysia: >
      Monsoon season (Oct-Jan East Coast; Apr-May West Coast) — always have contingency plan
      for outdoor events. Tent rental recommended for October onwards.
    Philippines: >
      Typhoon season Jun-Nov. Outdoor events need contingency; have indoor backup plan.
    Singapore: >
      Afternoon thunderstorms year-round. Outdoor events after 3pm need shelter.
