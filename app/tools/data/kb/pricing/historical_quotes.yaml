recurring_lessons:
  - lesson: Beef price must be locked in 30+ days before Eid events (March–April, June–July)
  - lesson: Festival events need overage clause — attendance routinely exceeds RSVP by 15–25%
  - lesson: Hotel-bundled catering deals are uncompetitive — do not bid on hotel-own-venue events
  - lesson: Small corporate lunches (<100 pax) at MYR 45 barely profitable — push for 150+ pax
  - lesson: Banana leaf service requires extra server hours — budget 2 extra ROLE-SV
  - lesson: Repeat clients accept quotes faster and require fewer revisions
  - lesson: Seasonal seafood surcharge needed for Dec–Jan Malaysia quotes
  - lesson: Loyalty discount (5%) demonstrably increases acceptance speed and client retention
