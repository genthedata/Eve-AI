---
# Market Rate Benchmarks Knowledge Base
# Per-head rates by event type, region, service style, cuisine category, and guest count tier.
# All figures in local currency per head. Updated: 2025-Q4.
# Source: industry reports, competitor intelligence, and internal bid win/loss data.
#
# Tiers:
#   budget   = economy / community caterers
#   standard = mid-market professional caterers (our primary positioning)
#   premium  = hotel catering / specialist high-end caterers
#   luxury   = ultra-premium / fine dining specialists

benchmarks:

  # ── Malaysia — Malay Events ────────────────────────────────────────────────
  - benchmark_id: BMK-MY-001
    event_type: malay_wedding
    region: Malaysia
    sub_region: Klang Valley / Selangor
    currency: MYR
    service_style: buffet
    cuisine_category: malay_traditional
    guest_count_tiers:
      - tier: small
        pax_range: [50, 150]
        budget: 55
        standard: 85
        premium: 140
        luxury: 220
      - tier: medium
        pax_range: [151, 400]
        budget: 50
        standard: 75
        premium: 120
        luxury: 200
      - tier: large
        pax_range: [401, 1000]
        budget: 45
        standard: 65
        premium: 100
        luxury: 180
    halal_cert_premium_myr: 8
    our_typical_positioning: standard
    notes: >
      JAKIM-certified halal adds MYR 8/head. Nasi minyak + rendang expected.
      Large-scale Malay weddings (400+) see price compression due to volume.
      Competitors: Pak Din Catering (budget–standard), Berjaya Catering (standard–premium).
    last_updated: "2025-Q4"

  - benchmark_id: BMK-MY-002
    event_type: malay_wedding
    region: Malaysia
    sub_region: Johor / Penang
    currency: MYR
    service_style: buffet
    cuisine_category: malay_traditional
    guest_count_tiers:
      - tier: all
        pax_range: [100, 1000]
        budget: 40
        standard: 65
        premium: 110
        luxury: 180
    notes: >
      Outside KL: 10–15% lower than Klang Valley. Higher transport cost offsets some savings.
    last_updated: "2025-Q4"

  - benchmark_id: BMK-MY-003
    event_type: funeral_tahlil
    region: Malaysia
    currency: MYR
    service_style: semi_buffet
    cuisine_category: malay_simple
    guest_count_tiers:
      - tier: all
        pax_range: [50, 500]
        budget: 18
        standard: 30
        premium: 50
        luxury: null
    notes: >
      Tahlil events are price-sensitive. Avoid premium pricing.
      Simple kuih, nasi lemak, or rice-based menu. Cash-on-day common.
    last_updated: "2025-Q4"

  # ── Malaysia — Chinese Events ──────────────────────────────────────────────
  - benchmark_id: BMK-MY-004
    event_type: chinese_banquet
    region: Malaysia
    sub_region: Klang Valley
    currency: MYR
    service_style: plated_10_course
    cuisine_category: chinese_cantonese
    guest_count_tiers:
      - tier: per_table_10pax
        pax_range: [50, 500]
        budget: 800
        standard: 1400
        premium: 2500
        luxury: 4500
    unit: per_table_of_10
    notes: >
      Chinese banquets quoted per table, not per head. MYR 140–250/head at standard.
      Hotel ballrooms typically at premium tier. Independent caterers at standard.
      Whole fish and roast duck are non-negotiable anchors at standard+.
    last_updated: "2025-Q4"

