  # ── Philippines ────────────────────────────────────────────────────────────
  - benchmark_id: BMK-PH-001
    event_type: wedding
    region: Philippines
    sub_region: Metro Manila
    currency: PHP
    service_style: buffet
    cuisine_category: filipino_international
    guest_count_tiers:
      - tier: small
        pax_range: [50, 150]
        budget: 900
        standard: 1600
        premium: 3000
        luxury: 5500
      - tier: medium
        pax_range: [151, 350]
        budget: 800
        standard: 1400
        premium: 2500
        luxury: 4500
      - tier: large
        pax_range: [351, 1000]
        budget: 700
        standard: 1200
        premium: 2000
        luxury: 3500
    notes: >
      Lechon at weddings: adds ~PHP 150–200/head at scale.
      Hotel venues (Makati, BGC) often include catering package — hardest to compete.
      Our sweet spot: Lechon + Filipino fusion at PHP 1200–1800/head (medium).
    last_updated: "2025-Q4"

  - benchmark_id: BMK-PH-002
