        budget: 120
        standard: 200
        premium: 350
        luxury: 600
      - tier: large
        pax_range: [151, 500]
        budget: 110
        standard: 180
        premium: 320
        luxury: 550
    notes: >
      KL hotel benchmark: MYR 200–280/head for standard plated. Our range MYR 160–200
