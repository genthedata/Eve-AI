# ── Service style uplifts ─────────────────────────────────────────────────
service_style_uplifts:
  - style: plated_over_buffet
    uplift_pct: 25
    reason: Higher staff-to-guest ratio, more plates, more service complexity.

  - style: live_station_per_station
    uplift_flat_myr: 1500
    uplift_flat_php: 27000
    uplift_flat_sgd: 500
    reason: Dedicated station chef, equipment, performance element.
    notes: Add per station on top of base per-head quote.

  - style: cocktail_vs_buffet
    uplift_pct: -20
    reason: Lower food volume, standing service, no table setup needed.

  - style: banana_leaf_vs_standard_buffet
    uplift_pct: 8
    reason: Additional setup (leaf sourcing, laying), cultural authenticity premium.

  - style: 10_course_chinese_vs_buffet
    uplift_pct: 30
    reason: Plated courses, higher coordination, more waste per head.

# ── Cuisine and compliance uplifts ────────────────────────────────────────
cuisine_uplifts:
  - category: halal_jakim_certified
    uplift_pct: 12
    notes: Full certification audit, dedicated equipment, certified supplier premium.

  - category: vegan_organic
    uplift_pct: 15
    notes: Organic and specialty plant-based ingredients cost more in SEA markets.

  - category: continental_fine_dining
    uplift_pct: 40
    notes: Imported proteins (wagyu, truffles), French-trained staff.

  - category: japanese_premium
    uplift_pct: 30
    notes: Imported fish, trained sashimi chef, premium tableware.

# ── Positioning guidance ─────────────────────────────────────────────────
positioning_rules:
  - rule_id: POS-001
    name: Within-range positioning
    description: >
      If computed quote is within ±5% of the standard tier, position as standard value.
      If >5% below standard, flag as potential underpricing (leaving money on table).
      If between standard and premium (5–15% above standard), lead with quality story.
      If >premium tier, justify with itemised premium breakdown or risk losing bid.

  - rule_id: POS-002
    name: Below-budget competitor response
    description: >
      When competitor price is known and we're above, quantify value gap:
      halal certification, past event track record, cultural expertise.
      If we cannot match within 10%, do not race to the bottom — decline gracefully.

  - rule_id: POS-003
    name: Hotel catering competition
    description: >
      Hotel bundled packages (room + catering) are difficult to compete with on price.
      Differentiate on: flexibility, cultural customisation, halal expertise, client control.
      Our outdoor/community venue specialisation is the moat vs. hotel catering.
