  - procurement_key: chocolate_kg
    name: Dark Chocolate (callets, 70%)
    category: baking
    unit: kg
    price_per_kg_myr: 35.00
    price_per_kg_php: 600.00
    price_per_kg_sgd: 28.00
    last_confirmed_price_myr: 33.00
    price_drift_pct: 6.1
