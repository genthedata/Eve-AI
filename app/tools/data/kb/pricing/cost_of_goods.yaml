    notes: Includes takeaway containers, napkins, disposable cutlery (if applicable).

# ── Buffet/event miscellaneous food overhead (not captured in per-dish costs) ─────────────
# Covers: beverages (water, sirap, juice), condiments, bread rolls, garnishes,
# uncounted small dishes (pickles, acar, sambal), and preparation waste uplift.
food_misc_overhead_per_pax_myr:
  buffet: 8.0
  semi_buffet: 6.0
  plated: 4.0
  cocktail: 3.0
  banana_leaf: 5.0

# Service style food cost multiplier
# Dish benchmarks are calibrated to buffet (shared) serving sizes.
# Plated service = larger individual portions + higher-quality ingredients.
service_style_food_cost_multiplier:
  buffet: 1.0
  semi_buffet: 1.0
  plated: 2.2
  cocktail: 0.7
  banana_leaf: 0.9

# Minimum total food cost per head by event type (floor, in MYR)
# Prevents unrealistically low estimates when menu has few or cheap dishes.
minimum_food_cost_per_head_myr:
  malay_wedding: 35.0
  chinese_banquet: 55.0
  corporate_gala_dinner: 65.0
  corporate_lunch: 18.0
  birthday_party: 22.0
  indian_wedding: 28.0
  product_launch: 25.0
  default: 20.0

# Waste and yield buffer applied to computed dish food cost (on top of recipe buffer)
food_cost_waste_uplift_by_event:
  malay_wedding: 1.18
  chinese_banquet: 1.10
  corporate_gala_dinner: 1.08
  corporate_lunch: 1.06
  birthday_party: 1.12
  indian_wedding: 1.08
  product_launch: 1.05
  default: 1.10

# ── Food cost benchmarks by dish (per serving) ────────────────────────────
# Pre-computed food cost ranges per serving in MYR to short-cut ingredient
# computation when a full recipe join isn't available.
dish_food_cost_benchmarks_myr:
  "Chicken Rendang":          {low: 4.50, mid: 5.50, high: 7.00}
  "Beef Rendang":             {low: 9.00, mid: 11.00, high: 14.00}
  "Chicken Adobo":            {low: 3.50, mid: 4.50, high: 5.50}
  "Beef Caldereta":           {low: 8.00, mid: 10.00, high: 12.00}
  "Hainanese Chicken Rice":   {low: 4.00, mid: 5.00, high: 6.50}
  "Butter Chicken":           {low: 5.00, mid: 6.50, high: 8.00}
  "Dal Tadka":                {low: 1.20, mid: 1.80, high: 2.50}
  "Vegetable Biryani":        {low: 3.00, mid: 4.00, high: 5.50}
  "Chicken Satay":            {low: 3.00, mid: 4.00, high: 5.00}
  "Pad Thai (Chicken)":       {low: 3.50, mid: 4.50, high: 5.50}
  "Tom Yum Soup":             {low: 2.00, mid: 3.00, high: 4.50}
  "Spring Rolls (Fried)":     {low: 0.80, mid: 1.20, high: 1.80}
  "Steamed Jasmine Rice":     {low: 0.40, mid: 0.60, high: 0.80}
  "Garlic Butter Vegetables": {low: 0.80, mid: 1.20, high: 1.80}
  "Leche Flan":               {low: 1.20, mid: 1.80, high: 2.50}
  "Mango Sticky Rice":        {low: 2.00, mid: 3.00, high: 4.50}
  "Coconut Panna Cotta":      {low: 1.80, mid: 2.50, high: 3.50}
  "Fresh Fruit Platter":      {low: 1.50, mid: 2.50, high: 4.00}
  "Pandan Cake":              {low: 1.50, mid: 2.00, high: 3.00}
  "Chocolate Lava Cake":      {low: 2.50, mid: 3.50, high: 5.00}

# ── Ingredients with active drift alerts ─────────────────────────────────
active_drift_alerts:
  - procurement_key: beef_kg
    current_vs_last_pct: 12.0
    action: "Flag for re-quote on any active bid using beef. Lock in supplier price immediately."
  - procurement_key: seafood_fish_kg
    current_vs_last_pct: 12.0
    action: "Seasonal alert — December events. Apply 15% seafood surcharge to quotes."
  - procurement_key: mango_kg
    current_vs_last_pct: 50.0
    action: "Critical seasonal drift. Substitute or apply 100% ingredient cost surcharge for Nov–Feb."
  - procurement_key: mixed_vegetables_kg
    current_vs_last_pct: 11.1
    action: "Near drift threshold. Monitor weekly during monsoon season."
