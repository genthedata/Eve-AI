    ne_monsoon_spike_pct: 40
    ne_monsoon_months_MY: [November, December, January, February]
    notes: >
      Cameron Highlands supply disrupted during NE monsoon (Nov–Feb).
      Price can double to MYR 10/kg in worst disruptions. Flag Dec–Jan events.

  - procurement_key: aromatics_kg
    name: Aromatics (garlic, onion, shallot, ginger)
    category: aromatics
    unit: kg
    price_per_kg_myr: 6.00
    price_per_kg_php: 100.00
    price_per_kg_sgd: 5.00
    last_confirmed_price_myr: 6.00
    price_drift_pct: 0.0
    seasonality: stable
    seasonal_risk: none

  - procurement_key: fresh_herbs_kg
    name: Fresh Herbs (lemongrass, kaffir lime, pandan, galangal)
    category: aromatics
    unit: kg
    price_per_kg_myr: 8.00
    price_per_kg_php: 120.00
    price_per_kg_sgd: 10.00
    last_confirmed_price_myr: 7.50
    price_drift_pct: 6.7
    seasonality: moderate
    seasonal_risk: low

  # ── Dairy & Alternatives ──────────────────────────────────────────────────
  - procurement_key: coconut_milk_l
    name: Coconut Milk (canned / fresh)
    category: dairy_alternative
    unit: litre
    price_per_l_myr: 4.00
    price_per_l_php: 45.00
