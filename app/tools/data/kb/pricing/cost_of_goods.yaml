  - procurement_key: mango_kg
    name: Fresh Mango (Carabao / Alphonso)
    category: fruit
    unit: kg
    price_per_kg_myr: 12.00
    price_per_kg_php: 180.00
    price_per_kg_sgd: 9.00
    last_confirmed_price_myr: 8.00
    price_drift_pct: 50.0
    seasonality: highly_volatile
    seasonal_risk: critical
    peak_months: [March, April, May]
    off_peak_months: [October, November, December]
    off_peak_price_multiplier: 2.0
    notes: >
      CRITICAL SEASONAL ITEM. Off-peak price (Oct–Dec) can be 2× peak price.
      For Dec events in Philippines, use frozen mango or substitute jackfruit.
      Always flag mango in quotes for Nov–Feb events.

  # ── Packaging & Consumables ───────────────────────────────────────────────
  - procurement_key: packaging_per_pax
    name: Packaging & Consumables (per person)
    category: consumables
    unit: per_person
    price_per_pax_myr: 2.50
    price_per_pax_php: 45.00
    price_per_pax_sgd: 2.00
    last_confirmed_price_myr: 2.50
    price_drift_pct: 0.0
