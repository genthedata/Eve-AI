---
# Cost of Goods Database
# Canonical price list for every ingredient used by the business.
# Keys use procurement_key format (same as inventory/supplier_catalog.yaml and
# inventory/ingredient_recipe_map.yaml) so the pricing agent can join directly
# against recipe-level quantities to compute per-head food cost.
#
# Prices reflect Q4-2025 contracted supplier rates.
# Drift alert threshold: ±12% from last_confirmed_price triggers re-quote flag.

price_update_schedule: quarterly
last_updated: "2025-Q4"
drift_alert_threshold_pct: 12

ingredients:

  # ── Proteins — Poultry ────────────────────────────────────────────────────
  - procurement_key: chicken_kg
    name: Chicken (whole or portioned, chilled)
    category: protein_poultry
    unit: kg
    price_per_kg_myr: 10.50
    price_per_kg_php: 185.00
    price_per_kg_sgd: 7.50
    halal_variant_premium_pct: 5
    last_confirmed_price_myr: 10.00
    price_drift_pct: 5.0
    seasonality: stable
    seasonal_risk: low
    festive_spike_pct: 15
    festive_months: [December, March, April]
    notes: >
      Price spikes ~15% during Christmas and Eid periods.
      Halal-certified bird adds 5%. Lock in for events in festive window.

  - procurement_key: duck_kg
    name: Duck (whole or portioned)
    category: protein_poultry
    unit: kg
    price_per_kg_myr: 18.00
    price_per_kg_php: 320.00
    price_per_kg_sgd: 14.00
    halal_variant_premium_pct: 8
    last_confirmed_price_myr: 17.00
    price_drift_pct: 5.9
    seasonality: stable
    seasonal_risk: low

  # ── Proteins — Beef ───────────────────────────────────────────────────────
  - procurement_key: beef_kg
    name: Beef (chuck / braising cut)
    category: protein_beef
    unit: kg
    price_per_kg_myr: 28.00
    price_per_kg_php: 390.00
    price_per_kg_sgd: 24.00
    halal_variant_premium_pct: 8
    last_confirmed_price_myr: 25.00
    price_drift_pct: 12.0
    seasonality: volatile
    seasonal_risk: high
    festive_spike_pct: 20
    festive_months: [March, April, June, July]
    notes: >
      Highly volatile. Current drift at alert threshold (12%).
      Lock in price 30 days ahead. Eid demand peaks March–April and June–July (Eid Adha).
      Wagyu premium 3–4× standard cut.

  - procurement_key: wagyu_beef_kg
    name: Wagyu Beef (MB5+)
    category: protein_beef_premium
    unit: kg
    price_per_kg_myr: 120.00
    price_per_kg_php: 2200.00
    price_per_kg_sgd: 95.00
    halal_variant_premium_pct: 0
    last_confirmed_price_myr: 118.00
    price_drift_pct: 1.7
    seasonality: stable
    seasonal_risk: low
    notes: Premium gala protein. Price relatively stable (import controlled).

  # ── Proteins — Pork ───────────────────────────────────────────────────────
  - procurement_key: pork_kg
    name: Pork (belly, shoulder, or whole)
    category: protein_pork
    unit: kg
    halal_compatible: false
    price_per_kg_php: 250.00
    last_confirmed_price_php: 240.00
    price_drift_pct: 4.2
    seasonality: moderate
    seasonal_risk: low
    festive_spike_pct: 20
    festive_months: [December, January]
    notes: "Non-halal only. Christmas season: 20% premium on whole pig (lechon)."

  # ── Proteins — Seafood ────────────────────────────────────────────────────
  - procurement_key: seafood_fish_kg
    name: Fresh Fish (seabass / snapper / white fish)
    category: protein_seafood
    unit: kg
    price_per_kg_myr: 28.00
    price_per_kg_php: 480.00
    price_per_kg_sgd: 20.00
    last_confirmed_price_myr: 25.00
    price_drift_pct: 12.0
    seasonality: volatile
    seasonal_risk: high
    sw_monsoon_spike_pct: 25
    ne_monsoon_spike_pct: 20
    monsoon_months_MY: [November, December, January, February]
    notes: >
      Wild catch volatile during monsoon. Farmed seabass more stable (+10% over wild).
      Price at alert threshold — flag quotes for December–January events.

  - procurement_key: seafood_prawn_kg
    name: Tiger Prawn / Large Prawn
    category: protein_seafood
    unit: kg
    price_per_kg_myr: 48.00
    price_per_kg_php: 650.00
    price_per_kg_sgd: 38.00
    last_confirmed_price_myr: 44.00
    price_drift_pct: 9.1
    seasonality: moderate
    seasonal_risk: medium
    festive_spike_pct: 20
    festive_months: [January, February, March, April]
    notes: CNY and Eid demand spikes. Farmed prawns more stable (5% lower).

  - procurement_key: seafood_salmon_kg
    name: Atlantic / Norwegian Salmon (fillet)
    category: protein_seafood_imported
    unit: kg
    price_per_kg_myr: 55.00
    price_per_kg_php: 760.00
    price_per_kg_sgd: 42.00
    last_confirmed_price_myr: 52.00
    price_drift_pct: 5.8
    seasonality: moderate
    seasonal_risk: medium
