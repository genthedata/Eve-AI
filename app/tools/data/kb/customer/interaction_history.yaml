    tier: standard
    flag: payment_risk
    action: Require 50% prepayment before confirming booking
  - client_id: CLT-005
    tier: gold
    action: Assign dedicated coordinator; confirm steamer for whole fish

escalation_triggers:
  - payment_overdue: Require prepayment for next event if >30 days overdue
  - complaint_unresolved: Escalate to Operations Manager within 24h
  - vip_platinum_new_inquiry: Alert Director of Operations within 1 hour of inquiry
  - repeat_complaint_same_client: Flag for Director review before confirming booking
