# ── CRM flags summary (used by customer_agent for quick lookup) ────────────
vip_flags:
  - client_id: CLT-001
    tier: gold
    action: Assign dedicated coordinator; waive admin fees
  - client_id: CLT-002
    tier: platinum
    action: Director-level touchpoint before event; dedicated coordinator mandatory
