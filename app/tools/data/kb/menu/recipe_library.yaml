---
# Recipe & Ingredient Library — Menu Agent Knowledge Base
# Rich metadata per dish enabling the menu agent to filter, rank, and compose menus.
# The inventory agent queries this for ingredient quantities (via ingredient_recipe_map.yaml);
# the menu agent queries this to answer: "which dishes fit this brief?"
#
# Fields per recipe:
#   cuisine, category, dietary_profiles, skill_level (1=easy 5=expert),
#   cooking_time_min, scale_performance, equipment_required,
#   occasion_suitability, service_style_compatibility,
#   quality_signal, complementary_dishes, variants,
#   avoid_with (cultural/dietary conflicts), seasonal_ingredient

