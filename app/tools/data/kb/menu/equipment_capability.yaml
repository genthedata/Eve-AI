# ── Venue constraint profiles ─────────────────────────────────────────────
venue_constraints:
  - venue_type: indoor_ballroom_no_gas
    gas_permitted: false
    power_capacity_kw: 50
    exhaust_system: false
    outdoor_space: false
    prohibited_techniques: [stir_fry, deep_fry, charcoal_grill, teppanyaki, rotisserie]
    allowed_techniques: [steam_rice, slow_braise, indoor_cooking, hot_hold, oven_bake, steam]
    recommended_menu_style: "Pre-cooked and transported. Avoid live stations."
    dishes_to_avoid: [Nasi Goreng, Pad Thai, Spring Rolls (Fried), Chicken Satay, Beef Satay]
    notes: >
      Most hotel ballrooms. Pre-cook at central kitchen and transport.
      Use induction cookers for soups and maintaining temps.

  - venue_type: outdoor_garden_full
    gas_permitted: true
    power_capacity_kw: 30
    exhaust_system: not_required
    outdoor_space: true
    prohibited_techniques: []
    allowed_techniques: [all]
    recommended_menu_style: "Full live station potential. Charcoal grill recommended."
    notes: >
      Ideal for satay station, BBQ, teppanyaki. Check weather contingency.
      Monsoon months (Nov-Feb) require shelter setup.

  - venue_type: community_hall_basic
    gas_permitted: true
    power_capacity_kw: 20
    exhaust_system: partial
    outdoor_space: partial
    prohibited_techniques: [teppanyaki]
    allowed_techniques: [stir_fry, slow_braise, steam_rice, hot_hold]
    notes: >
      Gas available but exhaust limited. No teppanyaki indoors.
      Satay grill must be set up outside.

  - venue_type: corporate_office_lobby
    gas_permitted: false
    power_capacity_kw: 15
    exhaust_system: false
    outdoor_space: false
    prohibited_techniques: [stir_fry, deep_fry, charcoal_grill, teppanyaki, rotisserie]
    allowed_techniques: [steam_rice, indoor_cooking, hot_hold]
    dishes_to_avoid: [Nasi Goreng, Pad Thai, Spring Rolls (Fried), any_live_station]
    recommended_menu_style: "Fully pre-prepared buffet. Simple replenishment only."

  - venue_type: outdoor_tent_partial
    gas_permitted: true
    power_capacity_kw: 25
    exhaust_system: not_required
    outdoor_space: true
    prohibited_techniques: [teppanyaki_indoors]
    allowed_techniques: [stir_fry, deep_fry_outdoor, charcoal_grill, slow_braise]
    notes: >
      Semi-outdoor venues under event tents. Full kitchen capability except teppanyaki.
      Confirm power supply for rice cookers before confirming menu.

# ── Capacity planning rules ────────────────────────────────────────────────
capacity_rules:
  - rule_id: CAP-001
    name: Deep-fry constraint
    description: >
      With 2 owned fryers: maximum 300 fried portions per hour. If menu includes
      deep-fried items for >300 pax, either: stagger service, rent additional fryer,
      or replace fried item with oven-baked alternative.
    trigger_pax_threshold: 300
    equipment: [EQ-004]

  - rule_id: CAP-002
    name: Satay scale limit
    description: >
      3 satay grills = 900 skewers/hour. If satay is main protein for >300 pax
      at a 1-hour service window, flag and consider adding a second protein option.
    trigger_pax_threshold: 300
    equipment: [EQ-005]

  - rule_id: CAP-003
    name: Live wok station limit
    description: >
      Nasi Goreng or Pad Thai live at >150 pax requires minimum 3 wok burners
      running simultaneously. Plan chef staffing accordingly.
    trigger_pax_threshold: 150
    equipment: [EQ-001]

  - rule_id: CAP-004
    name: Oven dessert limit
    description: >
      Chocolate Lava Cake: 30 per oven per 20 min. With 2 ovens: max 180 portions/hour.
      Not suitable as primary dessert for events >150 pax in plated format.
    trigger_pax_threshold: 150
    equipment: [EQ-006]
