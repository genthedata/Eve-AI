---
# Kitchen Equipment Capability Knowledge Base
# Maps what the business can actually cook, and where.
# Used by menu_agent to validate executability at the event venue BEFORE committing to a menu.
# Prevents recommending dishes that cannot be delivered on the day.

# ── Owned equipment inventory ─────────────────────────────────────────────
owned_equipment:
  - equipment_id: EQ-001
    name: Commercial Gas Wok Burner
    quantity: 4
    capacity_notes: Each burner handles 1 wok cycle simultaneously
    techniques: [stir_fry, saute, deep_fry_in_wok, blanch, boil]
    max_portions_per_cycle: 40
    cycle_time_min: 10
    throughput_per_hour: 240
    power: gas
    requires_outdoor_ventilation: true
    transport: portable
    notes: >
      4 wok burners = 960 portions/hour stir-fry capacity (peak).
      Each burner needs ventilation. Not suitable for indoor venues without exhaust.

  - equipment_id: EQ-002
    name: Commercial Rice Cooker (30L)
    quantity: 6
    capacity_notes: Each unit cooks 10kg dry rice = ~22kg cooked (~145 portions)
    techniques: [steam_rice, congee]
    max_portions_per_batch: 145
    batch_time_min: 45
    throughput_per_event_6units: 870
    power: electric_240v
    requires_outdoor_ventilation: false
    transport: portable
    notes: 6 units = 870 portions rice capacity per cook cycle.

  - equipment_id: EQ-003
    name: Commercial Stockpot (60L)
    quantity: 8
    capacity_notes: One pot = up to 80 portions of curry/stew
    techniques: [braise, boil, slow_cook, poach, blanch]
    max_portions_per_batch: 80
    batch_time_min: 120
    power: gas
    transport: portable
    notes: >
      8 stockpots = 640 portions braise capacity. Rendang requires 90-150 min.
      Allow 2 batch cycles for events >400 pax.

  - equipment_id: EQ-004
    name: Commercial Deep Fryer (20L oil)
    quantity: 2
    capacity_notes: One basket = 2kg raw food; 2 baskets per fryer
    techniques: [deep_fry]
    max_portions_per_cycle: 20
    cycle_time_min: 8
    throughput_per_hour_2units: 300
    power: gas
    requires_outdoor_ventilation: true
    transport: portable
    notes: >
      2 fryers = max 300 fried portions per hour. CRITICAL CONSTRAINT.
      Deep-fried menu items at 500+ pax must use both fryers continuously.
      Not suitable for indoor venues without fire suppression and exhaust.

  - equipment_id: EQ-005
    name: Satay / Charcoal Grill
    quantity: 3
    capacity_notes: One grill holds 50 skewers simultaneously; 10 min per batch
    techniques: [grill_skewer, charcoal_grill]
    max_portions_per_cycle: 50
    cycle_time_min: 10
    throughput_per_hour_3units: 900
    power: charcoal
    requires_outdoor_ventilation: true
    transport: portable
    notes: >
      3 grills = 900 satay skewers/hour. Outdoor or semi-outdoor only.
      Charcoal smoke requires open air. Never indoors.

  - equipment_id: EQ-006
    name: Convection Oven (60cm)
    quantity: 2
    capacity_notes: One oven = 4 full GN trays; 1 GN = ~20 portions
    techniques: [bake, roast, oven_braise]
    max_portions_per_batch: 80
    batch_time_min: 45
    power: electric_240v
    requires_outdoor_ventilation: false
    transport: medium_vehicle
    notes: >
      2 ovens = 160 portions per 45-min cycle. Used for desserts and oven-finished dishes.
      Chocolate lava cake: 30 portions per batch (limited ramekin quantity).

  - equipment_id: EQ-007
    name: Commercial Steamer (10-tray)
    quantity: 2
    capacity_notes: 10 trays = 10 x ~20 portions = 200 portions per cycle
    techniques: [steam, steam_rice, steamed_fish]
    max_portions_per_batch: 200
    batch_time_min: 25
    power: electric_240v
    requires_outdoor_ventilation: false
    transport: portable
    notes: >
      Ideal for leche flan, pandan cake (bain marie setup), dim sum.
      Also used for steaming fish at Chinese banquets.

  - equipment_id: EQ-008
    name: Teppanyaki Flat Griddle (90cm)
    quantity: 1
    capacity_notes: One griddle handles 30 portions simultaneously
    techniques: [griddle, teppanyaki, sear]
    max_portions_per_cycle: 30
    cycle_time_min: 12
    throughput_per_hour: 150
    power: gas
    requires_outdoor_ventilation: true
    requires_exhaust_system: true
    transport: heavy_vehicle
    notes: >
      CRITICAL: Teppanyaki requires exhaust system and ventilation.
      Only usable at venues with proper exhaust. Never propose at venues without exhaust confirmation.
      One chef per griddle required.

  - equipment_id: EQ-009
    name: Portable Induction Cooker (3.5kW)
    quantity: 10
    capacity_notes: Light cooking only; not suitable for high-heat stir fry
    techniques: [boil, simmer, maintain_temp, light_saute]
    max_portions_per_cycle: 40
    power: electric_240v
    requires_outdoor_ventilation: false
    transport: portable
    notes: >
      Used for indoor venues where gas is not permitted.
      Cannot replicate wok hei. Not suitable for Nasi Goreng or stir-fried dishes
      requiring high flame. Use for soups, maintaining curry temps, dal, raita.

  - equipment_id: EQ-010
    name: Chafing Dish / Bain Marie (full GN)
    quantity: 30
    capacity_notes: Maintains hot food temperature; not for cooking
    techniques: [hot_holding]
    power: sterno_or_electric
    transport: portable
    notes: >
      30 chafing dishes = simultaneous buffet line serving up to 15 dishes
      (2 chafing dishes per dish for rotation). Holding max 3h for safety.

  - equipment_id: EQ-011
    name: Refrigerated Transport Van
    quantity: 1
    capacity_notes: 1500L capacity; maintains 4C
    notes: Cold chain transport for chilled and prepared ingredients.

# ── Must-rent equipment (not owned) ──────────────────────────────────────
must_rent:
  - equipment_id: RENT-001
    name: Tandoor Oven
    rental_lead_days: 7
    rental_cost_approx_myr: 350
    techniques: [tandoor_bake, naan, tandoor_chicken]
    requires_outdoor_ventilation: true
    notes: Required for authentic naan and tandoori dishes. Rent from Indian supplier.

  - equipment_id: RENT-002
    name: Dum Cooking Rig (sealed pots + charcoal top heat)
    rental_lead_days: 3
    rental_cost_approx_myr: 150
    techniques: [dum_biryani]
    notes: Authentic biryani dum cooking. Can be improvised with oven if unavailable.

  - equipment_id: RENT-003
    name: Rotisserie Spit (gas, 20-bird)
    rental_lead_days: 5
    rental_cost_approx_myr: 450
    techniques: [rotisserie_roast, whole_chicken, whole_lamb]
    requires_outdoor_ventilation: true
    notes: For live roast stations. Outdoor only.

  - equipment_id: RENT-004
    name: Chocolate Fountain
    rental_lead_days: 3
    rental_cost_approx_myr: 180
    techniques: [dessert_station]
    notes: Birthday and gala dessert station. Requires level surface.

